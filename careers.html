<!DOCTYPE html>

     href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<body>

<!-- NAVBAR -->
<header>
    <nav class="navbar">
        <h2 class="logo">Edwin Chauke</h2>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>
</header>

<section class="careers">

<h2>Careers</h2>
<p>Apply to work with us by submitting your details below.</p>

<form class="careers-form"
      action="https://formsubmit.co/contact.edxcelai@gmail.com"
      method="POST"
      enctype="multipart/form-data">

    <input type="text" name="first_name" placeholder="First Name" required>
    <input type="text" name="surname" placeholder="Surname" required>
    <input type="email" name="email" placeholder="Email Address" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>

    <label>Upload CV</label>
    <input type="file" name="attachment" accept=".pdf,.doc,.docx" required>

    <button type="submit">Submit Application</button>

</form>



</section>

</body>
</html>
